decoration {
    rounding = 18
    active_opacity = 1.0
    inactive_opacity = 0.97
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.18
        vibrancy_darkness = 0.2
        popups = true
        popups_ignorealpha = 0.2
        input_methods = true
        input_methods_ignorealpha = 0.2
        ignore_opacity = true
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }
}

layerrule = blur on, match:namespace waybar
layerrule = blur_popups on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.2, match:namespace notifications

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.2, match:namespace rofi

# Dock blur may vary slightly by namespace across versions.
layerrule = blur on, match:namespace nwg-dock-hyprland
layerrule = ignore_alpha 0.2, match:namespace nwg-dock-hyprland
