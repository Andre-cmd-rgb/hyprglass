windowrule {
    name = float-system-tools
    match:class = ^(nm-connection-editor|pavucontrol|blueman-manager|org\.pulseaudio\.pavucontrol|hyprglass-float|org\.gnome\.Calculator|gnome-calculator|org\.gnome\.Settings|gnome-control-center)$
    float = on
    size = 68% 76%
    center = on
}

windowrule {
    name = float-file-choosers
    match:title = ^(Open File|Save File|Choose Files|File Upload|Library)$
    float = on
    size = 70% 75%
    center = on
}

windowrule = match:class .*, suppress_event maximize
