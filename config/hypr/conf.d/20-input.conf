input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# Current Hyprland removed gestures.workspace_swipe, gestures.workspace_swipe_fingers
# and gestures.workspace_swipe_min_fingers. The gesture line below is the current
# replacement for three-finger workspace swiping.
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
}

gesture = 3, horizontal, workspace

misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}
