font={{ custom.font }} 11
sort=-time
layer=overlay
anchor=top-right
margin=14,14,0
outer-margin=0
width=380
height=160
default-timeout=5000
ignore-timeout=0
max-visible=5
markup=1
actions=1
history=1
icons=1
max-icon-size=48
border-radius=16
padding=14
border-size=1

background-color={{ colors.surface_container.default.hex }}dd
text-color={{ colors.on_surface.default.hex }}
border-color={{ colors.outline_variant.default.hex }}cc
progress-color=source {{ colors.primary.default.hex }}

[urgency=high]
border-color={{ colors.error.default.hex }}
default-timeout=0

[mode=do-not-disturb]
invisible=1
